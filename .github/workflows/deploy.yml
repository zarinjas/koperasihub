name: Deploy ke VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite3, bcmath, gd
          tools: composer:v2

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create .env from Secret
        run: |
          echo "${{ secrets.ENV_PRODUCTION }}" > .env

      - name: Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install Node & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync ke VPS
        run: |
          rsync -avzr --delete \
            -e 'ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }}' \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='storage' \
            --exclude='database/database.sqlite' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Post-Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
            cp -rn demo-storage/public/* storage/app/public/ 2>/dev/null; \
            cp -rn demo-storage/private/* storage/app/private/ 2>/dev/null; \
            rm -rf demo-storage; \
            if [ ! -f database/database.sqlite ]; then \
              cp demo-database/database.sqlite database/database.sqlite; \
            fi; \
            rm -rf demo-database; \
            php artisan key:generate --force && \
            php artisan migrate --force && \
            php artisan storage:link --force && \
            php artisan config:cache && \
            php artisan route:cache && \
            php artisan view:cache && \
            php artisan optimize && \
            chmod -R 775 storage && \
            echo '✓ Deploy selesai!'"
